<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="model" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="62" fill="#f8fafc" font-size="34" font-weight="700">알잘딱깔센추 &#183; 서비스 아키텍처</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">백준 풀이 데이터 기반 맞춤형 알고리즘 문제 추천 서비스 &#183; Chrome Extension + FastAPI</text>
  <text x="60" y="114" fill="#64748b" font-size="13">🏅 2023 경희대학교 SW 페스티벌 대상 (전체 부문 통합 1위)</text>

  <!-- ============ Layer 1: User / Browser ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="160" width="520" height="220" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="84" y="190" fill="#60a5fa" font-size="14" font-weight="600" letter-spacing="1">CLIENT &#183; 사용자 브라우저</text>

  <!-- Baekjoon page -->
  <g filter="url(#shadow)">
    <rect x="84" y="208" width="220" height="148" rx="12" fill="#0b1220" stroke="#475569" stroke-width="1.5"/>
  </g>
  <text x="104" y="236" fill="#e2e8f0" font-size="16" font-weight="700">백준 (acmicpc.net)</text>
  <text x="104" y="260" fill="#94a3b8" font-size="13">문제 페이지 / 풀이 현황</text>
  <text x="104" y="300" fill="#64748b" font-size="12">DOM 위에 추천 UI를</text>
  <text x="104" y="318" fill="#64748b" font-size="12">인라인으로 주입(Inject)</text>

  <!-- Chrome extension -->
  <g filter="url(#shadow)">
    <rect x="324" y="208" width="232" height="148" rx="12" fill="url(#client)"/>
  </g>
  <text x="344" y="236" fill="#fff" font-size="16" font-weight="700">Chrome Extension</text>
  <text x="344" y="258" fill="#dbeafe" font-size="12">React &#183; TypeScript</text>
  <text x="344" y="276" fill="#dbeafe" font-size="12">Webpack &#183; Tailwind CSS</text>
  <text x="344" y="300" fill="#eff6ff" font-size="12">&#8226; Content Script (UI 주입)</text>
  <text x="344" y="318" fill="#eff6ff" font-size="12">&#8226; 추천 문제 카드 렌더링</text>
  <text x="344" y="336" fill="#eff6ff" font-size="12">&#8226; 사용자 풀이 데이터 수집</text>

  <!-- ============ Layer 2: Backend API ============ -->
  <g filter="url(#shadow)">
    <rect x="700" y="160" width="520" height="220" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="724" y="190" fill="#34d399" font-size="14" font-weight="600" letter-spacing="1">BACKEND &#183; 추천 API 서버</text>

  <g filter="url(#shadow)">
    <rect x="724" y="208" width="472" height="148" rx="12" fill="url(#api)"/>
  </g>
  <text x="746" y="238" fill="#fff" font-size="18" font-weight="700">FastAPI</text>
  <text x="746" y="262" fill="#d1fae5" font-size="13">REST API &#183; Axios 통신 (HTTPS / JSON)</text>
  <text x="746" y="296" fill="#ecfdf5" font-size="13">&#8226; /recommend  사용자별 추천 문제 응답</text>
  <text x="746" y="316" fill="#ecfdf5" font-size="13">&#8226; 풀이 이력 전처리 &amp; 피처 추출</text>
  <text x="746" y="336" fill="#ecfdf5" font-size="13">&#8226; 3개 모델 점수 가중 결합 (Ensemble)</text>

  <!-- ============ Layer 3: Recommendation Models ============ -->
  <g filter="url(#shadow)">
    <rect x="700" y="430" width="520" height="360" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="724" y="460" fill="#a78bfa" font-size="14" font-weight="600" letter-spacing="1">추천 엔진 &#183; 3-Model Ensemble</text>

  <!-- Model 1 -->
  <g filter="url(#shadow)">
    <rect x="724" y="478" width="472" height="88" rx="12" fill="url(#model)"/>
  </g>
  <text x="746" y="508" fill="#fff" font-size="16" font-weight="700">1 &#183; 문제 유사도 모델</text>
  <text x="746" y="532" fill="#ede9fe" font-size="12.5">푼 문제와 유사한 문제 추천 (태그/난이도/유형 임베딩 기반)</text>
  <text x="746" y="552" fill="#c4b5fd" font-size="12">Content-based Similarity</text>

  <!-- Model 2 -->
  <g filter="url(#shadow)">
    <rect x="724" y="578" width="472" height="88" rx="12" fill="url(#model)"/>
  </g>
  <text x="746" y="608" fill="#fff" font-size="16" font-weight="700">2 &#183; 망각 곡선 모델</text>
  <text x="746" y="632" fill="#ede9fe" font-size="12.5">복습 시점 도래 문제 재추천 (Ebbinghaus Forgetting Curve)</text>
  <text x="746" y="652" fill="#c4b5fd" font-size="12">Spaced Repetition</text>

  <!-- Model 3 -->
  <g filter="url(#shadow)">
    <rect x="724" y="678" width="472" height="88" rx="12" fill="url(#model)"/>
  </g>
  <text x="746" y="708" fill="#fff" font-size="16" font-weight="700">3 &#183; 취약 유형 모델</text>
  <text x="746" y="732" fill="#ede9fe" font-size="12.5">정답률 낮은 알고리즘 유형 집중 보완 추천</text>
  <text x="746" y="752" fill="#c4b5fd" font-size="12">Weakness Targeting</text>

  <!-- ============ Layer 4: Data ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="430" width="520" height="360" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="84" y="460" fill="#fbbf24" font-size="14" font-weight="600" letter-spacing="1">DATA &#183; 데이터 소스</text>

  <g filter="url(#shadow)">
    <rect x="84" y="478" width="472" height="100" rx="12" fill="url(#data)"/>
  </g>
  <text x="106" y="508" fill="#fff" font-size="16" font-weight="700">사용자 풀이 데이터</text>
  <text x="106" y="532" fill="#fffbeb" font-size="12.5">제출 이력, 정답/오답, 소요 시간, 시도 횟수</text>
  <text x="106" y="552" fill="#fef3c7" font-size="12">Extension이 백준 페이지에서 수집 &#8594; API 전송</text>

  <g filter="url(#shadow)">
    <rect x="84" y="592" width="472" height="100" rx="12" fill="url(#data)"/>
  </g>
  <text x="106" y="622" fill="#fff" font-size="16" font-weight="700">문제 메타데이터</text>
  <text x="106" y="646" fill="#fffbeb" font-size="12.5">문제 번호, 알고리즘 태그, 난이도(solved.ac Tier)</text>
  <text x="106" y="666" fill="#fef3c7" font-size="12">유사도 계산용 임베딩/피처 저장소</text>

  <text x="84" y="730" fill="#94a3b8" font-size="12.5" font-weight="600">데이터 흐름</text>
  <text x="84" y="752" fill="#64748b" font-size="12">수집 &#8594; 전처리 &#8594; 3모델 스코어링 &#8594; 가중 결합 &#8594; 추천 카드</text>
  <text x="84" y="772" fill="#64748b" font-size="12">사용자는 백준을 떠나지 않고 페이지 내에서 추천을 받음</text>

  <!-- ============ Flow Arrows ============ -->
  <!-- Baekjoon <-> Extension (inject) -->
  <line x1="304" y1="282" x2="324" y2="282" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- Extension -> FastAPI (request) -->
  <line x1="556" y1="262" x2="724" y2="262" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="566" y="252" fill="#34d399" font-size="12" font-weight="600">① 풀이 데이터 + 추천 요청</text>

  <!-- FastAPI -> Extension (response) -->
  <line x1="724" y1="302" x2="556" y2="302" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="566" y="322" fill="#34d399" font-size="12" font-weight="600">④ 추천 문제 리스트 (JSON)</text>

  <!-- FastAPI -> Models -->
  <line x1="960" y1="356" x2="960" y2="478" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="972" y="420" fill="#a78bfa" font-size="12" font-weight="600">② 피처 → 모델 스코어링</text>

  <!-- Models -> FastAPI (back) curved -->
  <path d="M 724 522 C 660 522 660 330 724 330" fill="none" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6 5"/>
  <text x="600" y="430" fill="#a78bfa" font-size="12" font-weight="600">③ 점수 결합</text>

  <!-- Data -> FastAPI / Models -->
  <line x1="556" y1="528" x2="724" y2="522" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="566" y="500" fill="#fbbf24" font-size="12" font-weight="600">데이터 제공</text>

  <!-- Legend -->
  <g transform="translate(60,808)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#client)"/><text x="20" y="12" fill="#cbd5e1" font-size="12">Client</text>
    <rect x="100" y="0" width="14" height="14" rx="3" fill="url(#api)"/><text x="120" y="12" fill="#cbd5e1" font-size="12">Backend</text>
    <rect x="210" y="0" width="14" height="14" rx="3" fill="url(#model)"/><text x="230" y="12" fill="#cbd5e1" font-size="12">추천 모델</text>
    <rect x="330" y="0" width="14" height="14" rx="3" fill="url(#data)"/><text x="350" y="12" fill="#cbd5e1" font-size="12">Data</text>
  </g>
</svg>
